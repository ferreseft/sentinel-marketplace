<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Sentinel Security Marketplace</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script src="https://unpkg.com/lucide@latest"></script>
  <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
  <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
</head>
<body class="bg-gray-50 text-gray-900 font-sans">
  <div id="root"></div>

  <script type="text/babel">
    const { useState, useEffect } = React;

    function App() {
      const [role, setRole] = useState('customer'); // customer, guard, admin
      
      // Dynamic lists connected to our Netlify REST API
      const [personnel, setPersonnel] = useState([]);
      const [requests, setRequests] = useState([]);
      const [matches, setMatches] = useState([]);
      const [notifications, setNotifications] = useState([]);
      const [selectedRequestId, setSelectedRequestId] = useState(1);
      
      const [loading, setLoading] = useState(false);
      const [error, setError] = useState(null);
      
      const [eventDate, setEventDate] = useState('2026-06-15');

      // Form States
      const [newRequest, setNewRequest] = useState({
        title: '',
        description: '',
        service_type_needed: 'executive',
        location: '',
        start_date: '2026-06-15 18:00:00',
        end_date: '2026-06-15 23:00:00',
        budget_min: 40,
        budget_max: 60,
        personnel_count: 2,
        urgency: 'standard'
      });
      
      const [newGuard, setNewGuard] = useState({
        first_name: '',
        last_name: '',
        email: '',
        phone: '',
        certifications: 'Armed Guard License, CPR/First Aid',
        years_experience: 5,
        service_types: 'armed,executive',
        hourly_rate: 35,
        daily_rate: 280,
        photo_url: 'https://images.unsplash.com/photo-1500648767791-00dcc994a43e?w=150',
        bio: 'Professional security guard with comprehensive field experience.',
        service_area: 'Miami-Dade County, FL'
      });

      // API Helper Fetchers
      const fetchPersonnel = async () => {
        try {
          const res = await fetch('/.netlify/functions/api-personnel');
          if (!res.ok) throw new Error('Failed to fetch personnel');
          const data = await res.json();
          setPersonnel(data);
        } catch (e) { 
          setError('Error loading personnel list: ' + e.message); 
        }
      };

      const fetchRequests = async () => {
        try {
          const res = await fetch('/.netlify/functions/api-hire-requests-list?customer_id=1');
          if (!res.ok) throw new Error('Failed to fetch hire requests');
          const data = await res.json();
          setRequests(data);
          if (data.length > 0 && !selectedRequestId) {
            setSelectedRequestId(data[0].id);
          }
        } catch (e) { 
          setError('Error loading requests: ' + e.message); 
        }
      };

      const fetchMatches = async (reqId) => {
        try {
          const targetId = reqId || selectedRequestId || 1;
          const res = await fetch(`/.netlify/functions/api-matches?hire_request_id=${targetId}`);
          if (!res.ok) throw new Error('Failed to fetch matches');
          const data = await res.json();
          setMatches(data);
        } catch (e) { 
          setError('Error loading matches: ' + e.message); 
        }
      };

      const fetchGuardInvitations = async (guardId) => {
        try {
          const res = await fetch(`/.netlify/functions/api-matches?personnel_id=${guardId}`);
          if (!res.ok) throw new Error('Failed to fetch invitations');
          const data = await res.json();
          setMatches(data);
        } catch (e) { 
          setError('Error loading invitations: ' + e.message); 
        }
      };

      const fetchNotifications = async (type, id) => {
        try {
          const res = await fetch(`/.netlify/functions/api-notifications?recipient_type=${type}&recipient_id=${id}`);
          if (!res.ok) throw new Error('Failed to fetch alerts');
          const data = await res.json();
          setNotifications(data);
        } catch (e) { 
          console.error('Error:', e); 
        }
      };

      // Load data on workspace switch
      const refreshData = async () => {
        setLoading(true);
        setError(null);
        try {
          if (role === 'customer') {
            await Promise.all([fetchRequests(), fetchPersonnel(), fetchNotifications('customer', 1)]);
            await fetchMatches(selectedRequestId || 1);
          } else if (role === 'guard') {
            await Promise.all([fetchGuardInvitations(1), fetchNotifications('personnel', 1)]);
          } else if (role === 'admin') {
            await Promise.all([fetchPersonnel(), fetchRequests(), fetchMatches()]);
          }
        } catch (err) {
          setError(err.message);
        }
        setLoading(false);
      };

      useEffect(() => {
        refreshData();
      }, [role]);

      // Actions
      const handleCreateRequest = async (e) => {
        e.preventDefault();
        setLoading(true);
        setError(null);
        try {
          const res = await fetch('/.netlify/functions/api-hire-requests', {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({ ...newRequest, customer_id: 1 })
          });
          if (!res.ok) throw new Error('Failed to submit new hire request.');
          const data = await res.json();
          alert(`Hire request submitted successfully! Matched with ${data.matches ? data.matches.length : 0} personnel!`);
          
          setSelectedRequestId(data.id);
          await fetchRequests();
          await fetchMatches(data.id);
          await fetchNotifications('customer', 1);
        } catch (e) { 
          setError('Submission failed: ' + e.message); 
        }
        setLoading(false);
      };

      const handleRegisterGuard = async (e) => {
        e.preventDefault();
        setLoading(true);
        setError(null);
        try {
          const res = await fetch('/.netlify/functions/api-personnel-register', {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify(newGuard)
          });
          if (!res.ok) throw new Error('Registration failed on server.');
          alert('Security Personnel profile registered successfully!');
          await fetchPersonnel();
          setNewGuard({
            first_name: '', last_name: '', email: '', phone: '',
            certifications: 'Armed Guard License, CPR/First Aid', years_experience: 5,
            service_types: 'armed,executive', hourly_rate: 35, daily_rate: 280,
            photo_url: 'https://images.unsplash.com/photo-1500648767791-00dcc994a43e?w=150',
            bio: 'Professional security guard with comprehensive field experience.',
            service_area: 'Miami-Dade County, FL'
          });
        } catch (e) { 
          setError('Registration failed: ' + e.message); 
        }
        setLoading(false);
      };

      const handleRespondMatch = async (matchId, status) => {
        setLoading(true);
        setError(null);
        try {
          const res = await fetch('/.netlify/functions/api-match-respond', {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({ match_id: matchId, status, notes: 'Responded via Web Workspace portal' })
          });
          if (!res.ok) throw new Error('Server rejected response.');
          alert(`Opportunity successfully ${status}!`);
          if (role === 'guard') {
            await fetchGuardInvitations(1);
            await fetchNotifications('personnel', 1);
          } else {
            await fetchMatches(selectedRequestId);
            await fetchNotifications('customer', 1);
          }
        } catch (e) { 
          setError('Response failed: ' + e.message); 
        }
        setLoading(false);
      };

      return (
        <div class="min-h-screen flex flex-col">
          {/* Header */}
          <header class="bg-slate-950 text-white p-4 shadow-md flex justify-between items-center">
            <div class="flex items-center space-x-2">
              <span class="text-2xl font-bold tracking-wider text-amber-500">SENTINEL</span>
              <span class="text-xs text-gray-400 uppercase tracking-widest hidden sm:inline">Security Marketplace</span>
            </div>
            <div class="flex space-x-2 bg-slate-900 p-1 rounded-md">
              <button onClick={() => setRole('customer')} class={`px-3 py-1 rounded text-sm transition ${role === 'customer' ? 'bg-amber-500 text-slate-950 font-bold' : 'text-gray-300'}`}>Customer Workspace</button>
              <button onClick={() => setRole('guard')} class={`px-3 py-1 rounded text-sm transition ${role === 'guard' ? 'bg-amber-500 text-slate-950 font-bold' : 'text-gray-300'}`}>Guard Portal</button>
              <button onClick={() => setRole('admin')} class={`px-3 py-1 rounded text-sm transition ${role === 'admin' ? 'bg-amber-500 text-slate-950 font-bold' : 'text-gray-300'}`}>Platform Admin</button>
            </div>
          </header>

          {/* Status Bars */}
          {loading && (
            <div class="bg-amber-500 text-slate-950 text-xs font-bold text-center py-1 uppercase tracking-wider animate-pulse">
              Syncing with Netlify Serverless API...
            </div>
          )}
          {error && (
            <div class="bg-rose-600 text-white text-xs font-bold text-center py-2 px-4 flex justify-between items-center">
              <span>{error}</span>
              <button onClick={() => setError(null)} class="font-black hover:text-gray-200">X</button>
            </div>
          )}

          {/* Main Dashboard */}
          <main class="flex-1 max-w-6xl w-full mx-auto p-4 sm:p-6">
            <h2 class="text-xl font-bold mb-6 text-slate-800 capitalize flex items-center">
              <span class="mr-2 text-amber-500">•</span> {role} Space
            </h2>

            {role === 'customer' && (
              <div class="grid grid-cols-1 md:grid-cols-3 gap-6">
                {/* Left panel - Hire form */}
                <div class="md:col-span-1 bg-white p-6 rounded-xl border border-gray-100 shadow-sm self-start">
                  <h3 class="text-lg font-bold mb-4 flex items-center text-slate-900">New Hire Request</h3>
                  <form onSubmit={handleCreateRequest} class="space-y-4 text-sm">
                    <div>
                      <label class="block text-gray-600 mb-1">Job Title</label>
                      <input type="text" required placeholder="e.g. VIP Dinner Security" class="w-full p-2 border border-gray-200 rounded-md focus:outline-amber-500" value={newRequest.title} onChange={e => setNewRequest({...newRequest, title: e.target.value})} />
                    </div>
                    <div>
                      <label class="block text-gray-600 mb-1">Service Type Needed</label>
                      <select class="w-full p-2 border border-gray-200 rounded-md focus:outline-amber-500" value={newRequest.service_type_needed} onChange={e => setNewRequest({...newRequest, service_type_needed: e.target.value})}>
                        <option value="armed">Armed Security</option>
                        <option value="unarmed">Unarmed Patrol</option>
                        <option value="event">Event Security</option>
                        <option value="executive">Executive Protection</option>
                        <option value="residential">Residential Patrol</option>
                        <option value="corporate">Corporate Office</option>
                        <option value="personal">Personal Escort</option>
                      </select>
                    </div>
                    <div>
                      <label class="block text-gray-600 mb-1">Location</label>
                      <input type="text" required placeholder="e.g. Miami Beach, FL" class="w-full p-2 border border-gray-200 rounded-md focus:outline-amber-500" value={newRequest.location} onChange={e => setNewRequest({...newRequest, location: e.target.value})} />
                    </div>
                    
                    <div>
                      <label class="block text-gray-600 mb-1">Date of the Event</label>
                      <input type="date" required class="w-full p-2 border border-gray-200 rounded-md focus:outline-amber-500" value={eventDate} onChange={e => {
                        const d = e.target.value;
                        setEventDate(d);
                        setNewRequest({
                          ...newRequest,
                          start_date: `${d} 18:00:00`,
                          end_date: `${d} 23:00:00`
                        });
                      }} />
                    </div>

                    <div class="grid grid-cols-3 gap-2">
                      <div>
                        <label class="block text-gray-600 mb-1">Min ($/hr)</label>
                        <input type="number" required class="w-full p-2 border border-gray-200 rounded-md focus:outline-amber-500" value={newRequest.budget_min} onChange={e => setNewRequest({...newRequest, budget_min: parseInt(e.target.value)})} />
                      </div>
                      <div>
                        <label class="block text-gray-600 mb-1">Max ($/hr)</label>
                        <input type="number" required class="w-full p-2 border border-gray-200 rounded-md focus:outline-amber-500" value={newRequest.budget_max} onChange={e => setNewRequest({...newRequest, budget_max: parseInt(e.target.value)})} />
                      </div>
                      <div>
                        <label class="block text-gray-600 mb-1">Guards Needed</label>
                        <input type="number" required class="w-full p-2 border border-gray-200 rounded-md focus:outline-amber-500" value={newRequest.personnel_count} onChange={e => setNewRequest({...newRequest, personnel_count: parseInt(e.target.value)})} />
                      </div>
                    </div>

                    <div>
                      <label class="block text-gray-600 mb-1">Description</label>
                      <textarea placeholder="Specify requirements, credentials, etc." class="w-full p-2 border border-gray-200 rounded-md focus:outline-amber-500" value={newRequest.description} onChange={e => setNewRequest({...newRequest, description: e.target.value})}></textarea>
                    </div>

                    <button type="submit" class="w-full bg-slate-950 text-white p-3 rounded-lg font-semibold hover:bg-slate-900 transition flex justify-center items-center">Submit & Run Match Engine</button>
                  </form>
                </div>

                {/* Right panel - List of Requests */}
                <div class="md:col-span-2 space-y-6">
                  {/* Active Requests */}
                  <div class="bg-white p-6 rounded-xl border border-gray-100 shadow-sm">
                    <h3 class="text-lg font-bold mb-4 text-slate-900">Your Active Hire Requests</h3>
                    <div class="space-y-3 max-h-80 overflow-y-auto pr-1">
                      {requests.length === 0 ? (
                        <p class="text-sm text-gray-400 italic">No active requests found.</p>
                      ) : (
                        requests.map(req => (
                          <div key={req.id} onClick={() => { setSelectedRequestId(req.id); fetchMatches(req.id); }} class={`border p-4 rounded-lg flex flex-col sm:flex-row justify-between items-start sm:items-center cursor-pointer transition ${selectedRequestId === req.id ? 'border-amber-500 bg-amber-50/20' : 'border-gray-100 bg-gray-50 hover:border-gray-300'}`}>
                            <div>
                              <h4 class="font-bold text-slate-800 text-base">{req.title}</h4>
                              <p class="text-xs text-gray-500 mt-1">Service: <span class="capitalize font-semibold text-slate-700">{req.service_type_needed}</span> | Location: {req.location} | Guards: {req.personnel_count || 1}</p>
                              <p class="text-xs text-gray-400 mt-1">Event Date: {req.start_date.substring(0, 10)}</p>
                            </div>
                            <span class="mt-2 sm:mt-0 px-3 py-1 bg-emerald-100 text-emerald-800 text-xs font-semibold rounded-full uppercase tracking-wider">{req.status}</span>
                          </div>
                        ))
                      )}
                    </div>
                  </div>

                  {/* Best Matches */}
                  <div class="bg-white p-6 rounded-xl border border-gray-100 shadow-sm">
                    <h3 class="text-lg font-bold mb-4 text-slate-900 flex justify-between items-center">
                      <span>Matches for Request #{selectedRequestId}</span>
                      <button onClick={() => fetchMatches(selectedRequestId)} class="text-xs font-semibold text-amber-600 border border-amber-500/20 px-2 py-1 rounded hover:bg-amber-50">Refresh Matches</button>
                    </h3>
                    <div class="grid grid-cols-1 sm:grid-cols-2 gap-4">
                      {matches.length === 0 ? (
                        <p class="col-span-full text-sm text-gray-400 italic py-4 text-center">No matches found yet. Submit a request to trigger matches.</p>
                      ) : (
                        matches.map(m => (
                          <div key={m.id} class="border border-gray-100 p-4 rounded-lg bg-white shadow-sm hover:shadow transition relative">
                            <span class="absolute top-2 right-2 bg-amber-500 text-slate-950 text-xs font-black px-2 py-0.5 rounded-full">{m.match_score}% Fit</span>
                            <div class="flex space-x-3 items-center">
                              <img src={m.photo_url} class="w-12 h-12 rounded-full object-cover border border-gray-200" />
                              <div>
                                <h4 class="font-semibold text-sm text-slate-800">{m.first_name} {m.last_name}</h4>
                                <p class="text-xs text-gray-500">{m.years_experience} yrs exp | {m.rating}★</p>
                                <p class="text-xs font-bold text-amber-500 mt-1">${m.hourly_rate}/hr</p>
                              </div>
                            </div>
                            <p class="text-xs text-gray-500 mt-2 line-clamp-2"><strong>Certifications:</strong> {m.certifications}</p>
                            <div class="mt-3 pt-3 border-t border-gray-50 flex justify-between items-center text-xs">
                              <span class="text-gray-500 font-semibold capitalize">Status: {m.status}</span>
                              {m.status === 'proposed' && (
                                <button onClick={() => handleRespondMatch(m.id, 'accepted')} class="bg-emerald-600 text-white font-bold px-3 py-1 rounded hover:bg-emerald-500">Hire</button>
                              )}
                            </div>
                          </div>
                        ))
                      )}
                    </div>
                  </div>
                </div>
              </div>
            )}

            {role === 'guard' && (
              <div class="grid grid-cols-1 md:grid-cols-3 gap-6">
                {/* Left panel - Register/Edit profile */}
                <div class="md:col-span-1 bg-white p-6 rounded-xl border border-gray-100 shadow-sm self-start">
                  <h3 class="text-lg font-bold mb-4 flex items-center text-slate-900">Register Guard Profile</h3>
                  <form onSubmit={handleRegisterGuard} class="space-y-4 text-sm">
                    <div class="grid grid-cols-2 gap-2">
                      <div>
                        <label class="block text-gray-600 mb-1">First Name</label>
                        <input type="text" required class="w-full p-2 border border-gray-200 rounded-md focus:outline-amber-500" value={newGuard.first_name} onChange={e => setNewGuard({...newGuard, first_name: e.target.value})} />
                      </div>
                      <div>
                        <label class="block text-gray-600 mb-1">Last Name</label>
                        <input type="text" required class="w-full p-2 border border-gray-200 rounded-md focus:outline-amber-500" value={newGuard.last_name} onChange={e => setNewGuard({...newGuard, last_name: e.target.value})} />
                      </div>
                    </div>
                    <div>
                      <label class="block text-gray-600 mb-1">Email</label>
                      <input type="email" required class="w-full p-2 border border-gray-200 rounded-md focus:outline-amber-500" value={newGuard.email} onChange={e => setNewGuard({...newGuard, email: e.target.value})} />
                    </div>
                    <div>
                      <label class="block text-gray-600 mb-1">Phone</label>
                      <input type="text" required class="w-full p-2 border border-gray-200 rounded-md focus:outline-amber-500" value={newGuard.phone} onChange={e => setNewGuard({...newGuard, phone: e.target.value})} />
                    </div>
                    <div>
                      <label class="block text-gray-600 mb-1">Service Types (comma list)</label>
                      <input type="text" required placeholder="e.g. armed,executive" class="w-full p-2 border border-gray-200 rounded-md focus:outline-amber-500" value={newGuard.service_types} onChange={e => setNewGuard({...newGuard, service_types: e.target.value})} />
                    </div>
                    <div class="grid grid-cols-2 gap-2">
                      <div>
                        <label class="block text-gray-600 mb-1">Hourly Rate ($)</label>
                        <input type="number" required class="w-full p-2 border border-gray-200 rounded-md focus:outline-amber-500" value={newGuard.hourly_rate} onChange={e => setNewGuard({...newGuard, hourly_rate: parseInt(e.target.value)})} />
                      </div>
                      <div>
                        <label class="block text-gray-600 mb-1">Exp (years)</label>
                        <input type="number" required class="w-full p-2 border border-gray-200 rounded-md focus:outline-amber-500" value={newGuard.years_experience} onChange={e => setNewGuard({...newGuard, years_experience: parseInt(e.target.value)})} />
                      </div>
                    </div>
                    <div>
                      <label class="block text-gray-600 mb-1">Service Area</label>
                      <input type="text" required class="w-full p-2 border border-gray-200 rounded-md focus:outline-amber-500" value={newGuard.service_area} onChange={e => setNewGuard({...newGuard, service_area: e.target.value})} />
                    </div>
                    <button type="submit" class="w-full bg-slate-950 text-white p-3 rounded-lg font-semibold hover:bg-slate-900 transition flex justify-center items-center">Join Marketplace</button>
                  </form>
                </div>

                {/* Right panel - Job invitations */}
                <div class="md:col-span-2 bg-white p-6 rounded-xl border border-gray-100 shadow-sm">
                  <h3 class="text-lg font-bold mb-4 text-slate-900 flex justify-between items-center">
                    <span>Job Invitations for Marcus Vance (Guard ID 1)</span>
                    <button onClick={() => fetchGuardInvitations(1)} class="text-xs font-semibold text-amber-600 border border-amber-500/20 px-2 py-1 rounded hover:bg-amber-50">Refresh Opportunities</button>
                  </h3>
                  <div class="space-y-4">
                    {matches.length === 0 ? (
                      <p class="text-sm text-gray-400 italic">No job invitations found for your profile.</p>
                    ) : (
                      matches.map(m => (
                        <div key={m.id} class="border border-gray-100 p-4 rounded-lg bg-gray-50 flex flex-col sm:flex-row justify-between items-start sm:items-center shadow-sm">
                          <div>
                            <h4 class="font-bold text-slate-800 text-base">{m.title}</h4>
                            <p class="text-xs text-gray-500 mt-1">{m.location} | Budget: ${m.budget_min}-${m.budget_max}/hr</p>
                            <p class="text-xs text-emerald-600 font-bold mt-1">Match Score: {m.match_score}%</p>
                            <p class="text-xs text-gray-400 mt-1">Status: <span class="capitalize font-semibold text-slate-700">{m.status}</span></p>
                            {m.description && <p class="text-xs text-gray-500 mt-2 italic">"{m.description}"</p>}
                          </div>
                          {m.status === 'proposed' && (
                            <div class="flex space-x-2 mt-3 sm:mt-0 self-end sm:self-center">
                              <button onClick={() => handleRespondMatch(m.id, 'accepted')} class="bg-emerald-600 text-white px-4 py-2 rounded text-xs font-bold hover:bg-emerald-500">Accept</button>
                              <button onClick={() => handleRespondMatch(m.id, 'rejected')} class="bg-rose-600 text-white px-4 py-2 rounded text-xs font-bold hover:bg-rose-500">Decline</button>
                            </div>
                          )}
                        </div>
                      ))
                    )}
                  </div>
                </div>
              </div>
            )}

            {role === 'admin' && (
              <div class="space-y-6">
                <div class="grid grid-cols-1 md:grid-cols-3 gap-6">
                  <div class="bg-white p-6 rounded-xl border border-gray-100 shadow-sm text-center">
                    <h4 class="text-xs uppercase text-gray-400 font-bold tracking-widest">Registered Personnel</h4>
                    <p class="text-3xl font-extrabold text-slate-800 mt-2">{personnel.length}</p>
                  </div>
                  <div class="bg-white p-6 rounded-xl border border-gray-100 shadow-sm text-center">
                    <h4 class="text-xs uppercase text-gray-400 font-bold tracking-widest">Hire Requests</h4>
                    <p class="text-3xl font-extrabold text-slate-800 mt-2">{requests.length}</p>
                  </div>
                  <div class="bg-white p-6 rounded-xl border border-gray-100 shadow-sm text-center">
                    <h4 class="text-xs uppercase text-gray-400 font-bold tracking-widest">Total Matches</h4>
                    <p class="text-3xl font-extrabold text-slate-800 mt-2">{matches.length}</p>
                  </div>
                </div>
                
                {/* Admin Personnel List */}
                <div class="bg-white p-6 rounded-xl border border-gray-100 shadow-sm">
                  <h3 class="text-lg font-bold mb-4 text-slate-900">Platform Registered Security Personnel</h3>
                  <div class="grid grid-cols-1 sm:grid-cols-2 md:grid-cols-3 gap-4">
                    {personnel.length === 0 ? (
                      <p class="col-span-full text-sm text-gray-400 italic py-2">No security personnel profiles registered yet.</p>
                    ) : (
                      personnel.map(p => (
                        <div key={p.id} class="border border-gray-100 p-4 rounded-lg flex space-x-3 items-center bg-gray-50">
                          <img src={p.photo_url} class="w-12 h-12 rounded-full object-cover border border-gray-200" />
                          <div>
                            <h4 class="font-semibold text-sm text-slate-800">{p.first_name} {p.last_name}</h4>
                            <p class="text-xs text-gray-500 capitalize">{p.service_types} • {p.years_experience} yrs</p>
                            <p class="text-xs font-bold text-amber-500 mt-1">${p.hourly_rate}/hr | {p.rating}★</p>
                          </div>
                        </div>
                      ))
                    )}
                  </div>
                </div>
              </div>
            )}
          </main>
        </div>
      );
    }

    const root = ReactDOM.createRoot(document.getElementById('root'));
    root.render(<App />);
  </script>
</body>
</html>
